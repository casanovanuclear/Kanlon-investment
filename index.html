<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Kanlon Investments</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#3B5BDB;--blue-light:#E6F1FB;
  --green:#1D9E75;--green-light:#E1F5EE;
  --red:#E24B4A;--red-light:#FCEBEB;
  --amber-dark:#854F0B;--amber-light:#FAEEDA;--amber-border:#F0997B;
  --purple:#534AB7;--purple-light:#EEEDFE;
  --bg:#f5f5f3;--card:#fff;--border:#e0e0e0;--border2:#ccc;
  --text:#111;--text2:#555;--text3:#999;
  --input-bg:#fff;--secondary-bg:#f0f0ed;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1a1a1a;--card:#252525;--border:#333;--border2:#444;
  --text:#eee;--text2:#aaa;--text3:#666;--input-bg:#2a2a2a;--secondary-bg:#2a2a2a;}
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);min-height:100vh;display:flex;justify-content:center}
.app{width:100%;max-width:430px;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;position:relative}
.topbar{background:var(--card);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--border);flex-shrink:0;position:sticky;top:0;z-index:10}
.topbar-title{font-size:16px;font-weight:600;color:var(--text)}
.icon-btn{width:32px;height:32px;border-radius:50%;border:0.5px solid var(--border2);background:var(--secondary-bg);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:var(--text2)}
.tabs-wrap{background:var(--bg);padding:10px 12px 0;flex-shrink:0;position:sticky;top:42px;z-index:9}
.tabs{display:flex;background:var(--secondary-bg);border-radius:12px;padding:3px;gap:2px}
.tab{flex:1;padding:8px 0;text-align:center;font-size:13px;border-radius:9px;cursor:pointer;color:var(--text2);border:none;background:transparent;font-family:inherit;font-weight:400;transition:all .15s}
.tab.active{background:var(--card);color:var(--blue);font-weight:500;border:0.5px solid var(--border)}
.content{padding:12px;flex:1;overflow-y:auto}
.page-title{font-size:21px;font-weight:600;color:var(--text);margin-bottom:2px}
.page-sub{font-size:13px;color:var(--text2);margin-bottom:14px}
.search-row{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.search-box{flex:1;display:flex;align-items:center;gap:8px;background:var(--card);border:0.5px solid var(--border);border-radius:10px;padding:0 10px;height:38px}
.search-box input{border:none;background:transparent;font-size:13px;color:var(--text);outline:none;flex:1;font-family:inherit}
.filter-sel{height:38px;border:0.5px solid var(--border);border-radius:10px;padding:0 8px;font-size:12px;background:var(--card);color:var(--text);cursor:pointer;font-family:inherit}
.new-btn{height:38px;padding:0 14px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:inherit}
.new-btn:active{opacity:.8}
.loan-card{background:var(--card);border-radius:12px;border:0.5px solid var(--border);padding:14px;margin-bottom:10px;transition:border-color .15s}
.loan-card.overdue-card{border-color:var(--red);border-width:1px}
.loan-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px;gap:8px}
.borrower-name{font-size:14px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:7px;flex:1;min-width:0}
.borrower-name span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.status-badge{font-size:10px;font-weight:500;padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.badge-active{background:var(--green-light);color:#085041}
.badge-overdue{background:var(--red-light);color:#791F1F}
.badge-completed{background:var(--blue-light);color:#0C447C}
.phone-row{font-size:11px;color:var(--text2);margin-bottom:8px}
.overdue-alert{background:var(--red-light);border-radius:8px;padding:7px 10px;font-size:12px;color:#791F1F;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.fee-badge{background:var(--amber-light);border-radius:8px;padding:5px 10px;font-size:11px;color:var(--amber-dark);margin-bottom:8px;display:flex;align-items:center;gap:5px}
.prog-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:3px}
.prog-bg{height:5px;background:var(--secondary-bg);border-radius:3px;margin-bottom:10px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;background:var(--green);transition:width .3s}
.prog-fill.red{background:var(--red)}
.amounts-row{display:flex;gap:10px;margin-bottom:11px;flex-wrap:wrap}
.amt{flex:1;min-width:70px}
.amt-lbl{font-size:10px;color:var(--text2);margin-bottom:1px}
.amt-val{font-size:13px;font-weight:500;color:var(--text)}
.card-actions{display:flex;gap:6px}
.act-btn{flex:1;height:34px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:0.5px solid var(--border2);font-family:inherit;transition:opacity .1s;background:transparent;color:var(--text)}
.act-btn:active{opacity:.7}
.act-pay{background:#111;color:#fff;border-color:#111}
.act-pay.red-pay{background:var(--red);border-color:var(--red);color:#fff}
.act-bulk{background:transparent;color:var(--blue);border-color:var(--blue)}
.act-detail{background:transparent;color:var(--text)}
.act-delete{background:transparent;color:var(--red);border-color:var(--red)}

/* Dashboard */
.hero-card{background:var(--blue);border-radius:12px;padding:22px;text-align:center;margin-bottom:10px}
.hero-lbl{font-size:11px;font-weight:500;color:rgba(255,255,255,.75);letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px}
.hero-val{font-size:30px;font-weight:600;color:#fff;margin-bottom:6px}
.hero-sub{font-size:12px;color:rgba(255,255,255,.8);background:rgba(0,0,0,.2);display:inline-block;padding:3px 12px;border-radius:20px}
.metric-card{background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px}
.metric-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:8px;font-size:16px}
.metric-name{font-size:12px;color:var(--text2);margin-bottom:3px}
.metric-val{font-size:20px;font-weight:600;color:var(--text)}
.danger-card{border-color:var(--red)}.danger-card .metric-name{color:#A32D2D}.danger-card .metric-val{color:var(--red)}

/* Reports */
.sel-card{background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px}
.sel-title{display:flex;align-items:center;gap:7px;font-size:15px;font-weight:500;margin-bottom:11px;color:var(--text)}
.month-sel{width:100%;height:40px;border:0.5px solid var(--border2);border-radius:8px;padding:0 10px;font-size:14px;background:var(--input-bg);color:var(--text);cursor:pointer;font-family:inherit}
.rpt-card{border-radius:12px;padding:18px;margin-bottom:10px}
.rpt-card.blue-rpt{background:var(--blue-light)}
.rpt-card.green-rpt{background:var(--green-light)}
.rpt-card.purple-rpt{background:var(--purple-light)}
.rpt-lbl{font-size:13px;font-weight:500;margin-bottom:5px}
.rpt-val{font-size:24px;font-weight:600;color:#111}
.rpt-sub{font-size:12px;margin-top:3px}
.blue-rpt .rpt-lbl,.blue-rpt .rpt-sub{color:var(--blue)}
.green-rpt .rpt-lbl,.green-rpt .rpt-sub{color:var(--green)}
.purple-rpt .rpt-lbl,.purple-rpt .rpt-sub{color:var(--purple)}

/* Detail */
.detail-header{background:var(--blue);border-radius:12px;padding:18px;margin-bottom:12px;color:#fff}
.detail-name{font-size:18px;font-weight:600;margin-bottom:3px}
.detail-phone{font-size:13px;opacity:.8;margin-bottom:12px}
.detail-stats{display:flex;gap:8px}
.detail-stat{flex:1;background:rgba(255,255,255,.18);border-radius:8px;padding:10px;text-align:center}
.detail-stat-val{font-size:15px;font-weight:600}
.detail-stat-lbl{font-size:10px;opacity:.75;margin-top:2px}
.payment-history-title{font-size:14px;font-weight:500;margin-bottom:10px;color:var(--text)}
.payment-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:0.5px solid var(--border)}
.payment-item:last-child{border-bottom:none}
.payment-date{font-size:12px;color:var(--text2)}
.payment-amount{font-size:14px;font-weight:500;color:var(--green)}
.payment-fee{font-size:14px;font-weight:500;color:var(--amber-dark)}
.back-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--blue);background:none;border:none;cursor:pointer;padding:0 0 12px;font-family:inherit}
.empty-state{text-align:center;padding:40px 20px;color:var(--text2);font-size:14px}

/* Modals */
.modal-wrap{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:200}
.modal-sheet{background:var(--card);border-radius:16px 16px 0 0;padding:20px 18px 32px;width:100%;max-width:430px;max-height:92vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-title{font-size:17px;font-weight:600;color:var(--text)}
.modal-close{width:28px;height:28px;border:none;background:var(--secondary-bg);border-radius:50%;font-size:16px;cursor:pointer;color:var(--text2);font-family:inherit;line-height:1}
.form-row{display:flex;gap:10px;margin-bottom:12px}
.form-group{flex:1;min-width:0;margin-bottom:12px}
.form-label{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:4px;display:block}
.form-input{width:100%;height:42px;border:0.5px solid var(--border2);border-radius:8px;padding:0 10px;font-size:14px;background:var(--input-bg);color:var(--text);outline:none;font-family:inherit}
.form-input:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(59,91,219,.1)}
.form-hint{font-size:11px;color:var(--text3);margin-top:3px}
.calc-preview{background:var(--green-light);border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:13px;color:#085041;line-height:1.6}
.calc-preview strong{color:#043d2a}
.gbox{background:var(--amber-light);border-radius:8px;padding:12px;margin-bottom:14px}
.gbox-title{font-size:12px;font-weight:500;color:var(--amber-dark);margin-bottom:9px}
.ginput{width:100%;height:36px;border:0.5px solid var(--amber-border);border-radius:6px;padding:0 8px;font-size:13px;background:rgba(255,255,255,.6);color:#633806;outline:none;font-family:inherit}
.create-btn{width:100%;height:46px;background:#111;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit}
.create-btn:active{opacity:.8}
.pay-big-input{width:100%;height:56px;border:0.5px solid var(--border2);border-radius:10px;padding:0 14px;font-size:26px;font-weight:500;color:var(--text);background:var(--input-bg);outline:none;font-family:inherit;margin-bottom:10px}
.pay-big-input:focus{border-color:var(--blue)}
.quick-amounts{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.quick-amt{padding:7px 12px;border:0.5px solid var(--border2);border-radius:20px;font-size:12px;cursor:pointer;background:var(--secondary-bg);color:var(--text);font-family:inherit}
.quick-amt:hover{background:var(--blue-light);color:var(--blue);border-color:var(--blue)}
.quick-amt.fee-quick{background:var(--amber-light);color:var(--amber-dark);border-color:var(--amber-border)}
.quick-amt.fee-quick:hover{background:var(--amber-border);color:#fff}
.pay-btn{width:100%;height:46px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit}
.pay-btn:active{opacity:.8}
.bulk-preview{background:var(--secondary-bg);border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:13px;color:var(--text2)}
.divider{height:0.5px;background:var(--border);margin:14px 0}
.fee-info-box{background:var(--amber-light);border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:12px;color:var(--amber-dark);line-height:1.6}

/* Toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 22px;border-radius:22px;font-size:13px;z-index:999;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .25s;box-shadow:0 4px 16px rgba(0,0,0,.3)}
.toast.show{opacity:1}
/* Sync indicator */
.sync-bar{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--blue);color:#fff;font-size:11px;font-weight:500;text-align:center;padding:4px;z-index:999;transition:opacity .3s;opacity:0;pointer-events:none}
.sync-bar.show{opacity:1}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="topbar">
    <div style="width:32px"></div>
    <span class="topbar-title">Kanlon Investments</span>
    <div style="display:flex;gap:6px">
      <div class="icon-btn">···</div>
    </div>
  </div>
  <div class="tabs-wrap">
    <div class="tabs" id="tabs">
      <button class="tab active" onclick="showTab('loans',this)">Loans</button>
      <button class="tab" onclick="showTab('dashboard',this)">Dashboard</button>
      <button class="tab" onclick="showTab('reports',this)">Reports</button>
    </div>
  </div>
  <div id="main-content" style="flex:1"></div>
</div>
<div class="toast" id="toast"></div>
<div class="sync-bar" id="sync-bar"></div>

<script>
/*
  LOAN MODEL
  ----------
  principal     : amount borrowed (KES)
  interestRate  : e.g. 20 means 20% — applied to principal
  fee           : processing fee (KES) — added to total collectible, paid FIRST, not in daily calc
  dailyDue      : daily installment — only covers (principal + interest), NOT the fee
  startDate     : loan start date

  Total to collect = principal + interest + fee
  Interest        = principal * interestRate / 100
  Daily calc      = (principal + interest) / number_of_days  [fee excluded]

  Fee payment logic:
    - The fee is tracked separately as loan.feePaid (boolean)
    - When recording a payment, if fee not yet paid the modal offers "Pay fee first"
    - Fee payment is shown distinctly in history (amber colour)
    - Remaining shown = (principal + interest - dailyPaymentsTotal) + (fee if not paid)
    - Progress bar = dailyPaymentsTotal / (principal + interest) [fee excluded from progress]
*/

const fmt = n => 'KES '+parseFloat(n||0).toLocaleString('en-KE',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtDate = d => {try{return new Date(d+'T00:00:00').toLocaleDateString('en-KE',{day:'2-digit',month:'short',year:'numeric'})}catch(e){return d}};
const today = () => new Date().toISOString().slice(0,10);
const monthKey = d => (d||'').slice(0,7);
const escHtml = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

let state = {
  loans: [],
  nextId: 1,
  currentTab: 'loans',
  view: null,
  searchQ: '',
  filterPeriod: 'all',
  reportMonth: monthKey(today()),
};

/* ─── LOAN CALCULATION ──────────────────────────────────────────────── */
function loanCalc(loan) {
  const interest = Math.round(loan.principal * (loan.interestRate || 20) / 100);
  const loanTotal = loan.principal + interest;      // what daily payments cover
  const totalCollectible = loanTotal + (loan.fee || 0); // full amount to collect incl fee

  const dailyPayments = loan.payments.filter(p => p.type === 'daily' || !p.type);
  const feePayments   = loan.payments.filter(p => p.type === 'fee');
  const dailyPaid     = dailyPayments.reduce((s, p) => s + p.amount, 0);
  const feePaid       = feePayments.reduce((s, p) => s + p.amount, 0);
  const totalPaid     = dailyPaid + feePaid;

  const dailyRemaining = Math.max(0, loanTotal - dailyPaid);
  const feeRemaining   = loan.fee > 0 && !loan.feePaid ? loan.fee - feePaid : 0;
  const remaining      = dailyRemaining + feeRemaining;

  // Progress only tracks daily principal repayment (fee excluded)
  const pct = Math.min(100, Math.round((dailyPaid / loanTotal) * 100));
  const isComplete = dailyRemaining <= 0 && feeRemaining <= 0;

  const todayStr = today();
  const startMs = new Date(loan.startDate + 'T00:00:00').getTime();
  const nowMs   = new Date(todayStr + 'T00:00:00').getTime();
  const daysSinceStart = Math.floor((nowMs - startMs) / 86400000);
  const overdueDays = Math.max(0, daysSinceStart - dailyPayments.length);
  const overdueAmt  = overdueDays * loan.dailyDue;

  return { interest, loanTotal, totalCollectible, dailyPaid, feePaid, totalPaid, dailyRemaining, feeRemaining, remaining, pct, isComplete, overdueDays, overdueAmt };
}

/* ─── TOAST ──────────────────────────────────────────────────────────── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2600);
}

/* ─── PERSISTENCE ────────────────────────────────────────────────────── */
// Claude persistent storage — syncs across sessions via claude.ai
// Falls back to localStorage when storage API is unavailable

async function saveState() {
  const data = JSON.stringify({ loans: state.loans, nextId: state.nextId });
  // Try Claude storage API (primary — persists across devices/sessions)
  try { await window.storage.set('kanlon_data', data); } catch(e) {}
  // Always mirror to localStorage as offline backup
  try { localStorage.setItem('kanlon_v4', data); } catch(e) {}
}

async function loadState() {
  let saved = null;
  // 1. Try Claude storage (most up to date, cross-device)
  try {
    const result = await window.storage.get('kanlon_data');
    if (result && result.value) saved = result.value;
  } catch(e) {}
  // 2. Fall back to localStorage
  if (!saved) {
    try {
      saved = localStorage.getItem('kanlon_v4') ||
              localStorage.getItem('kanlon_state');
    } catch(e) {}
  }
  if (saved) {
    try {
      const p = JSON.parse(saved);
      if (p.loans) p.loans = p.loans.map(l => ({
        interestRate: 20, fee: 350, feePaid: false,
        ...l,
        payments: (l.payments || []).map(pay => ({ type: 'daily', ...pay }))
      }));
      state.loans  = p.loans  || [];
      state.nextId = p.nextId || (p.loans && p.loans.length ? Math.max(...p.loans.map(l => l.id)) + 1 : 1);
    } catch(e) {}
  }
}

/* ─── RENDER ROUTER ──────────────────────────────────────────────────── */
function render() {
  const mc = document.getElementById('main-content');
  if (state.view && state.view.type === 'detail') { renderDetail(mc); return; }
  if (state.currentTab === 'loans')     renderLoans(mc);
  else if (state.currentTab === 'dashboard') renderDashboard(mc);
  else renderReports(mc);
}

/* ─── LOANS LIST ─────────────────────────────────────────────────────── */
function renderLoans(mc) {
  let loans = [...state.loans];
  if (state.searchQ) {
    const q = state.searchQ.toLowerCase();
    loans = loans.filter(l => l.name.toLowerCase().includes(q) || l.phone.includes(q));
  }
  if (state.filterPeriod === 'thisMonth') {
    const m = monthKey(today());
    loans = loans.filter(l => monthKey(l.startDate) === m || l.payments.some(p => monthKey(p.date) === m));
  }
  loans.sort((a, b) => {
    const ca = loanCalc(a), cb = loanCalc(b);
    if (ca.isComplete !== cb.isComplete) return ca.isComplete ? 1 : -1;
    if ((ca.overdueDays > 0) !== (cb.overdueDays > 0)) return ca.overdueDays > 0 ? -1 : 1;
    return 0;
  });

  let h = `<div class="content">
  <h1 class="page-title">Active Loans</h1>
  <p class="page-sub">Manage borrower accounts and payments</p>
  <div class="search-row">
    <div class="search-box">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/><path d="M10 10l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <input placeholder="Search name, phone..." value="${escHtml(state.searchQ)}" oninput="state.searchQ=this.value;render()" />
    </div>
    <select class="filter-sel" onchange="state.filterPeriod=this.value;render()">
      <option value="all" ${state.filterPeriod === 'all' ? 'selected' : ''}>All Time</option>
      <option value="thisMonth" ${state.filterPeriod === 'thisMonth' ? 'selected' : ''}>This Month</option>
    </select>
    <button class="new-btn" onclick="openCreateModal()">+ New</button>
  </div>`;

  if (!loans.length) { h += `<div class="empty-state">No loans found</div>`; }

  loans.forEach(loan => {
    const c = loanCalc(loan);
    const isOverdue = c.overdueDays > 0 && !c.isComplete;
    const badge = c.isComplete
      ? `<span class="status-badge badge-completed">COMPLETED</span>`
      : isOverdue
        ? `<span class="status-badge badge-overdue">${c.overdueDays} DAY${c.overdueDays > 1 ? 'S' : ''} OVERDUE</span>`
        : `<span class="status-badge badge-active">ACTIVE</span>`;

    const feePending = loan.fee > 0 && !loan.feePaid;

    h += `<div class="loan-card ${isOverdue ? 'overdue-card' : ''}">
      <div class="loan-header">
        <div class="borrower-name">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="flex-shrink:0"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span>${escHtml(loan.name)}</span>
        </div>${badge}
      </div>
      <div class="phone-row">📞 ${escHtml(loan.phone)}${loan.guarantorName ? ` &nbsp;·&nbsp; 🛡 ${escHtml(loan.guarantorName)}` : ''}</div>
      ${feePending ? `<div class="fee-badge">💳 Processing fee pending: ${fmt(loan.fee)}</div>` : ''}
      ${isOverdue ? `<div class="overdue-alert">⚠ Overdue: ${fmt(c.overdueAmt)} (${c.overdueDays} day${c.overdueDays > 1 ? 's' : ''})</div>` : ''}
      <div class="prog-row"><span>Loan Progress</span><span>${c.pct}%</span></div>
      <div class="prog-bg"><div class="prog-fill ${isOverdue ? 'red' : ''}" style="width:${c.pct}%"></div></div>
      <div class="amounts-row">
        <div class="amt"><div class="amt-lbl">Remaining</div><div class="amt-val">${fmt(c.remaining)}</div></div>
        <div class="amt"><div class="amt-lbl">Daily Due</div><div class="amt-val">${fmt(loan.dailyDue)}</div></div>
        <div class="amt"><div class="amt-lbl">Total Paid</div><div class="amt-val">${fmt(c.totalPaid)}</div></div>
      </div>
      <div class="card-actions">
        ${c.isComplete
          ? `<button class="act-btn act-detail" onclick="openDetail(${loan.id})">View Details</button><button class="act-btn act-delete" onclick="deleteLoan(${loan.id})">Delete</button>`
          : `<button class="act-btn act-pay ${isOverdue ? 'red-pay' : ''}" onclick="openPay(${loan.id})">Pay</button><button class="act-btn act-bulk" onclick="openBulkPay(${loan.id})">Bulk Pay</button><button class="act-btn act-detail" onclick="openDetail(${loan.id})">Details</button>`}
      </div>
    </div>`;
  });

  h += `</div>`;
  mc.innerHTML = h;
}

/* ─── DASHBOARD ──────────────────────────────────────────────────────── */

  const loans = state.loans;

  const totalCollected   = calcs.reduce((s, { c }) => s + c.totalPaid, 0);

  const completedLoans   = loans.filter(l => loanCalc(l).isComplete);

  mc.innerHTML = `<div class="content">
  <h1 class="page-title">Summary Dashboard</h1>
  <p class="page-sub">Aggregate financial metrics and outstanding amounts</p>
  <div class="hero-card">
    <div class="hero-lbl">Total Amount to be Collected</div>

    <div class="metric-card" style="margin-bottom:0">
      <div class="metric-icon" style="background:#EEEDFE">💳</div>
      <div class="metric-name">Total Collected</div>
      <div class="metric-val" style="font-size:16px">${fmt(totalCollected)}</div>
    </div>
    <div class="metric-card" style="margin-bottom:0">

    <div class="metric-card" style="margin-bottom:0">

      <div class="metric-name">Completed Loans</div>
      <div class="metric-val" style="font-size:16px">${completedLoans.length}</div>
    </div>
    <div class="metric-card" style="margin-bottom:0">
      <div class="metric-icon" style="background:var(--blue-light)">📋</div>
      <div class="metric-name">Total Loans</div>
      <div class="metric-val" style="font-size:16px">${loans.length}</div>
    </div>
  </div>
  ${totalOverdue > 0 ? `<div class="metric-card danger-card">
    <div class="metric-icon" style="background:#FCEBEB">⚠️</div>

    <div class="metric-val">${fmt(totalOverdue)}</div>

/* ─── REPORTS ────────────────────────────────────────────────────────── */
function getMonthOptions() {
  const months = new Set([monthKey(today())]);
  state.loans.forEach(l => { months.add(monthKey(l.startDate)); l.payments.forEach(p => months.add(monthKey(p.date))); });
  return [...months].sort().reverse();
}

function renderReports(mc) {
  const months = getMonthOptions();
  if (!months.includes(state.reportMonth)) state.reportMonth = months[0] || monthKey(today());
  const m = state.reportMonth;
  const newLoans = state.loans.filter(l => monthKey(l.startDate) === m);
  const newPrincipal = newLoans.reduce((s, l) => s + l.principal, 0);
  const newInterest  = newLoans.reduce((s, l) => s + Math.round(l.principal * (l.interestRate || 20) / 100), 0);
  const allPayments  = state.loans.flatMap(l => l.payments.filter(p => monthKey(p.date) === m));
  const totalPayments = allPayments.reduce((s, p) => s + p.amount, 0);
  const outstanding  = state.loans.filter(l => !loanCalc(l).isComplete).reduce((s, l) => s + loanCalc(l).remaining, 0);
  const [y, mo] = m.split('-');
  const mLabel = new Date(parseInt(y), parseInt(mo) - 1, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

  mc.innerHTML = `<div class="content">
  <h1 class="page-title">Monthly Data Generation</h1>
  <p class="page-sub">Loan activity, payments received, and outstanding balances</p>
  <div class="sel-card">
    <div class="sel-title"><svg width="16" height="16" viewBox="0 0 20 20" fill="none"><rect x="2" y="4" width="16" height="14" rx="2" stroke="#534AB7" stroke-width="1.5"/><path d="M6 2v4M14 2v4M2 8h16" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round"/></svg>Select Month</div>
    <div style="font-size:11px;color:var(--text2);margin-bottom:5px">Month and Year</div>
    <select class="month-sel" onchange="state.reportMonth=this.value;render()">
      ${months.map(mo => `<option value="${mo}" ${mo === state.reportMonth ? 'selected' : ''}>${new Date(mo + '-01T00:00:00').toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}</option>`).join('')}
    </select>
  </div>
  <div style="font-size:15px;font-weight:500;margin-bottom:12px;color:var(--text)">Report Data for ${mLabel}</div>
  <div class="rpt-card blue-rpt">
    <div class="rpt-lbl">New Loans Issued</div>
    <div class="rpt-val">${newLoans.length}</div>
    <div class="rpt-sub">Principal: ${fmt(newPrincipal)} &nbsp;·&nbsp; Interest: ${fmt(newInterest)}</div>
  </div>
  <div class="rpt-card green-rpt">
    <div class="rpt-lbl">Total Payments Received</div>
    <div class="rpt-val">${fmt(totalPayments)}</div>
    <div class="rpt-sub">Across all active/completed loans this month</div>
  </div>
  <div class="rpt-card purple-rpt">
    <div class="rpt-lbl">Outstanding Balances</div>
    <div class="rpt-val">${fmt(outstanding)}</div>
    <div class="rpt-sub">Remaining across all active loans (incl. fees)</div>
  </div>
  </div>`;
}

/* ─── DETAIL VIEW ────────────────────────────────────────────────────── */

  const loan = state.loans.find(l => l.id === state.view.loanId);
  if (!loan) { state.view = null; render(); return; }
  const c = loanCalc(loan);
  const isOverdue = c.overdueDays > 0 && !c.isComplete;
  const sorted = [...loan.payments].sort((a, b) => b.date.localeCompare(a.date));

  mc.innerHTML = `<div class="content">
  <button class="back-btn" onclick="state.view=null;render()"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M10 3L4 8l6 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Back to loans</button>
  <div class="detail-header">
    <div class="detail-name">${escHtml(loan.name)}</div>
    <div class="detail-phone">📞 ${escHtml(loan.phone)} &nbsp;·&nbsp; Started ${fmtDate(loan.startDate)}</div>
    <div class="detail-stats">
      <div class="detail-stat"><div class="detail-stat-val">${fmt(loan.principal)}</div><div class="detail-stat-lbl">Principal</div></div>
      <div class="detail-stat"><div class="detail-stat-val">${loan.interestRate || 20}%</div><div class="detail-stat-lbl">Interest</div></div>

    </div>
  </div>

  <div style="background:var(--card);border-radius:10px;padding:12px;margin-bottom:12px;border:0.5px solid var(--border)">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px">
      <div><div style="font-size:10px;color:var(--text2);margin-bottom:2px">Loan Total (principal + interest)</div><div style="font-weight:500">${fmt(c.loanTotal)}</div></div>
      <div><div style="font-size:10px;color:var(--text2);margin-bottom:2px">Processing Fee</div><div style="font-weight:500;color:${loan.feePaid ? 'var(--green)' : 'var(--amber-dark)'}">${fmt(loan.fee)} ${loan.feePaid ? '✓ paid' : '⏳ pending'}</div></div>

      <div><div style="font-size:10px;color:var(--text2);margin-bottom:2px">Daily Installment</div><div style="font-weight:500">${fmt(loan.dailyDue)}</div></div>
    </div>
  </div>

  ${isOverdue ? `<div class="overdue-alert" style="margin-bottom:12px">⚠ ${c.overdueDays} day${c.overdueDays > 1 ? 's' : ''} overdue — ${fmt(c.overdueAmt)} unpaid</div>` : ''}
  ${c.isComplete ? `<div style="background:var(--green-light);border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:13px;color:#085041;display:flex;align-items:center;gap:6px">✅ Loan fully repaid on ${fmtDate(sorted[0]?.date || '')}!</div>` : ''}
  ${loan.guarantorName ? `<div class="metric-card" style="margin-bottom:12px"><div class="metric-name">🛡 Guarantor</div><div class="metric-val" style="font-size:15px">${escHtml(loan.guarantorName)}</div>${loan.guarantorPhone ? `<div style="font-size:12px;color:var(--text2);margin-top:2px">📞 ${escHtml(loan.guarantorPhone)}</div>` : ''}</div>` : ''}
  ${!c.isComplete ? `<div style="display:flex;gap:8px;margin-bottom:16px"><button class="pay-btn" style="flex:1" onclick="openPay(${loan.id})">Record Payment</button><button class="act-btn act-bulk" style="flex:1;height:46px" onclick="openBulkPay(${loan.id})">Bulk Pay</button></div>` : ''}
  <div class="payment-history-title">Payment History (${sorted.length} payment${sorted.length !== 1 ? 's' : ''})</div>
  ${sorted.length ? sorted.map(p => `

      <div><div style="font-size:13px;color:var(--text)">${p.type === 'fee' ? '🏷️ Processing fee' : '💵 Daily payment'}</div><span class="payment-date">${fmtDate(p.date)}</span></div>
      <span class="${p.type === 'fee' ? 'payment-fee' : 'payment-amount'}">+${fmt(p.amount)}</span>

/* ─── MODALS ─────────────────────────────────────────────────────────── */
let ms = {};

function openCreateModal() { ms = { type: 'create' }; renderModal(); }
function openPay(id)        { ms = { type: 'pay', loanId: id, amount: '' }; renderModal(); }
function openBulkPay(id)    { ms = { type: 'bulk', loanId: id, days: '' }; renderModal(); }
function openDetail(id)     { state.view = { type: 'detail', loanId: id }; render(); }

async function deleteLoan(id) {
  if (!confirm('Delete this loan? This cannot be undone.')) return;
  state.loans = state.loans.filter(l => l.id !== id);
  showSyncIndicator('saving');
  await saveState();
  hideSyncIndicator();
  showToast('Loan deleted'); render();
}

function closeModal(e) {
  if (e && e.target !== document.querySelector('.modal-wrap')) return;
  ms = {}; const r = document.getElementById('modal-root'); if (r) r.innerHTML = '';
}
function closeModalDirect() { ms = {}; const r = document.getElementById('modal-root'); if (r) r.innerHTML = ''; }

function getOrMakeRoot() {
  let el = document.getElementById('modal-root');
  if (!el) { el = document.createElement('div'); el.id = 'modal-root'; document.body.appendChild(el); }
  return el;
}

function updateCalcPreview() {
  const principal = parseFloat(document.getElementById('f-principal')?.value) || 0;
  const rate      = parseFloat(document.getElementById('f-rate')?.value) || 20;
  const fee       = parseFloat(document.getElementById('f-fee')?.value) || 350;
  const daily     = parseFloat(document.getElementById('f-daily')?.value) || 0;
  const el        = document.getElementById('calc-preview');
  if (!el) return;
  if (!principal) { el.innerHTML = 'Enter a principal amount to see the breakdown.'; return; }
  const interest      = Math.round(principal * rate / 100);
  const loanTotal     = principal + interest;
  const totalCollect  = loanTotal + fee;
  const daysToRepay   = daily > 0 ? Math.ceil(loanTotal / daily) : '—';
  el.innerHTML = `
    <strong>Interest (${rate}%):</strong> ${fmt(interest)}<br>
    <strong>Loan total (principal + interest):</strong> ${fmt(loanTotal)}<br>
    <strong>Processing fee:</strong> ${fmt(fee)} <span style="font-size:11px;opacity:.75">(first payment, separate)</span><br>
    <strong>Total to collect:</strong> ${fmt(totalCollect)}<br>
    ${daily > 0 ? `<strong>Days to repay:</strong> ${daysToRepay} day${daysToRepay !== 1 ? 's' : ''} at ${fmt(daily)}/day` : ''}`;
}

function renderModal() {
  const el = getOrMakeRoot();
  if (!ms.type) { el.innerHTML = ''; return; }

  if (ms.type === 'create') {
    el.innerHTML = `<div class="modal-wrap" onclick="closeModal(event)"><div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-header"><div class="modal-title">Create New Loan</div><button class="modal-close" onclick="closeModalDirect()">✕</button></div>

      <div class="form-row">
        <div class="form-group" style="margin-bottom:0"><label class="form-label">Borrower Name *</label><input class="form-input" id="f-name" placeholder="e.g. John Doe" autocomplete="off"/></div>
        <div class="form-group" style="margin-bottom:0"><label class="form-label">Borrower Phone</label><input class="form-input" id="f-phone" placeholder="e.g. 0712345678" type="tel"/></div>
      </div>
      <div style="height:12px"></div>

      <div class="form-row">
        <div class="form-group" style="margin-bottom:0"><label class="form-label">Principal Amount (KES) *</label><input class="form-input" id="f-principal" type="number" min="0" placeholder="10000" oninput="updateCalcPreview()"/></div>
        <div class="form-group" style="margin-bottom:0"><label class="form-label">Interest Rate (%) *</label><input class="form-input" id="f-rate" type="number" min="0" max="100" step="0.5" placeholder="20" value="20" oninput="updateCalcPreview()"/>
          <div class="form-hint">Default: 20%</div>
        </div>
      </div>
      <div style="height:12px"></div>

      <div class="form-row">
        <div class="form-group" style="margin-bottom:0"><label class="form-label">Daily Repayment (KES) *</label><input class="form-input" id="f-daily" type="number" min="0" placeholder="400" oninput="updateCalcPreview()"/>
          <div class="form-hint">Covers principal + interest only</div>
        </div>
        <div class="form-group" style="margin-bottom:0"><label class="form-label">Processing Fee (KES)</label><input class="form-input" id="f-fee" type="number" min="0" placeholder="350" value="350" oninput="updateCalcPreview()"/>
          <div class="form-hint">Default: KES 350 — paid first</div>
        </div>
      </div>
      <div style="height:12px"></div>

      <div class="form-group"><label class="form-label">Start Date</label><input class="form-input" id="f-date" type="date" value="${today()}"/></div>

      <div class="calc-preview" id="calc-preview">Enter a principal amount to see the breakdown.</div>

      <div class="gbox">
        <div class="gbox-title">🛡 Guarantor Info (Optional)</div>
        <div style="display:flex;gap:8px">
          <div style="flex:1"><div style="font-size:11px;color:var(--amber-dark);margin-bottom:4px">Name</div><input class="ginput" id="f-gname" placeholder="e.g. Jane Smith" style="width:100%"/></div>
          <div style="flex:1"><div style="font-size:11px;color:var(--amber-dark);margin-bottom:4px">Phone</div><input class="ginput" id="f-gphone" placeholder="e.g. 0798765432" style="width:100%" type="tel"/></div>
        </div>
      </div>
      <button class="create-btn" onclick="submitCreateLoan()">Create Loan</button>
    </div></div>`;
    setTimeout(() => document.getElementById('f-name') && document.getElementById('f-name').focus(), 50);

  } else if (ms.type === 'pay') {
    const loan = state.loans.find(l => l.id === ms.loanId);
    const c = loanCalc(loan);
    const feePending = loan.fee > 0 && !loan.feePaid;
    const quickAmts = [...new Set([loan.dailyDue, loan.dailyDue * 2, loan.dailyDue * 7, Math.round(c.dailyRemaining)].filter(v => v > 0 && v <= c.dailyRemaining))].slice(0, 4);

    el.innerHTML = `<div class="modal-wrap" onclick="closeModal(event)"><div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-header"><div class="modal-title">Record Payment</div><button class="modal-close" onclick="closeModalDirect()">✕</button></div>
      <div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px">${escHtml(loan.name)}</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:12px">
        Loan remaining: <strong>${fmt(c.dailyRemaining)}</strong> &nbsp;·&nbsp; Daily: <strong>${fmt(loan.dailyDue)}</strong>
        ${feePending ? ` &nbsp;·&nbsp; Fee pending: <strong style="color:var(--amber-dark)">${fmt(loan.fee)}</strong>` : ''}
      </div>

      ${feePending ? `<div class="fee-info-box">
        💳 <strong>Processing fee of ${fmt(loan.fee)} is still outstanding.</strong><br>
        This is collected separately from daily instalments. You can record it below or skip to record a daily payment.
        <div style="margin-top:8px"><button class="quick-amt fee-quick" onclick="recordFeePayment(${loan.id})">Pay fee now: ${fmt(loan.fee)}</button></div>
      </div>` : ''}

      <input class="pay-big-input" id="pay-amt" type="number" min="0.01" step="0.01" placeholder="0.00" oninput="ms.amount=this.value"/>
      <div style="font-size:11px;color:var(--text2);margin-bottom:7px">Quick amounts (daily instalments)</div>
      <div class="quick-amounts">
        ${quickAmts.map(v => `<button class="quick-amt" onclick="setPayAmt(${v})">${fmt(v)}</button>`).join('')}
      </div>
      <div class="form-group"><label class="form-label">Payment Date</label><input class="form-input" id="pay-date" type="date" value="${today()}"/></div>
      <button class="pay-btn" onclick="submitPayment()">Confirm Daily Payment</button>
    </div></div>`;
    setTimeout(() => document.getElementById('pay-amt') && document.getElementById('pay-amt').focus(), 50);

  } else if (ms.type === 'bulk') {
    const loan = state.loans.find(l => l.id === ms.loanId);
    const c = loanCalc(loan);
    const feePending = loan.fee > 0 && !loan.feePaid;
    el.innerHTML = `<div class="modal-wrap" onclick="closeModal(event)"><div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-header"><div class="modal-title">Bulk Payment</div><button class="modal-close" onclick="closeModalDirect()">✕</button></div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:12px">${escHtml(loan.name)} &nbsp;·&nbsp; ${fmt(loan.dailyDue)}/day &nbsp;·&nbsp; Remaining: ${fmt(c.dailyRemaining)}</div>
      ${feePending ? `<div class="fee-info-box">💳 Fee of ${fmt(loan.fee)} is pending separately. <button class="quick-amt fee-quick" style="margin-left:4px" onclick="recordFeePayment(${loan.id})">Pay fee now</button></div>` : ''}
      <div class="form-group"><label class="form-label">Number of Days to Pay</label><input class="form-input" id="bulk-days" type="number" min="1" step="1" placeholder="e.g. 7" oninput="ms.days=this.value;updateBulkPreview()"/></div>
      <div class="bulk-preview" id="bulk-preview">Enter number of days to see total</div>
      <div class="form-group"><label class="form-label">Starting From Date</label><input class="form-input" id="bulk-date" type="date" value="${today()}"/></div>
      <button class="pay-btn" onclick="submitBulkPayment()">Confirm Bulk Payment</button>
    </div></div>`;
  }
}

function setPayAmt(v) { const i = document.getElementById('pay-amt'); if (i) { i.value = v; ms.amount = v; } }

function updateBulkPreview() {
  const d = parseInt(ms.days) || 0;
  const loan = state.loans.find(l => l.id === ms.loanId);
  const c = loanCalc(loan);
  const total = Math.min(d * loan.dailyDue, c.dailyRemaining);
  const p = document.getElementById('bulk-preview');
  if (p && d > 0) p.innerHTML = `<strong>${d} day${d > 1 ? 's' : ''}</strong> = <strong style="color:var(--green)">${fmt(total)}</strong>`;
}

async function recordFeePayment(id) {
  const loan = state.loans.find(l => l.id === id);
  if (!loan || loan.feePaid) return;
  const date = document.getElementById('pay-date')?.value || document.getElementById('bulk-date')?.value || today();
  loan.payments.push({ date, amount: loan.fee, type: 'fee' });
  loan.feePaid = true;
  showSyncIndicator('saving');
  await saveState();
  hideSyncIndicator();
  closeModalDirect();
  showToast(`Processing fee of ${fmt(loan.fee)} recorded ✓`);
  render();
}

async function submitCreateLoan() {
  const name      = document.getElementById('f-name').value.trim();
  const principal = parseFloat(document.getElementById('f-principal').value) || 0;
  const rate      = parseFloat(document.getElementById('f-rate').value);
  const daily     = parseFloat(document.getElementById('f-daily').value) || 0;
  const fee       = parseFloat(document.getElementById('f-fee').value);
  if (!name)            { showToast('Borrower name is required'); return; }
  if (!principal || principal <= 0) { showToast('Enter a valid principal amount'); return; }
  if (!daily || daily <= 0)         { showToast('Enter a valid daily repayment amount'); return; }

  const interestRate = isNaN(rate) ? 20 : rate;
  const processingFee = isNaN(fee) ? 350 : fee;

  const loan = {
    id: state.nextId++, name,
    phone: document.getElementById('f-phone').value.trim(),
    principal, interestRate, fee: processingFee, feePaid: false,
    dailyDue: daily,
    startDate: document.getElementById('f-date').value || today(),
    guarantorName:  document.getElementById('f-gname').value.trim(),
    guarantorPhone: document.getElementById('f-gphone').value.trim(),
    payments: []
  };
  state.loans.unshift(loan);
  showSyncIndicator('saving');
  await saveState();
  hideSyncIndicator();
  closeModalDirect();
  showToast('Loan created for ' + name + ' ✓');
  render();
}

async function submitPayment() {
  const amount = parseFloat(document.getElementById('pay-amt').value) || 0;
  const date   = document.getElementById('pay-date').value || today();
  if (!amount || amount <= 0) { showToast('Enter a valid amount'); return; }
  const loan = state.loans.find(l => l.id === ms.loanId);
  const c = loanCalc(loan);
  const actual = Math.min(amount, c.dailyRemaining);
  if (actual <= 0) { showToast('Daily loan already fully paid'); return; }
  loan.payments.push({ date, amount: actual, type: 'daily' });
  showSyncIndicator('saving');
  await saveState();
  hideSyncIndicator();
  closeModalDirect();
  const nc = loanCalc(loan);
  showToast(nc.isComplete ? '🎉 Loan fully repaid!' : `Payment of ${fmt(actual)} recorded ✓`);
  render();
}

async function submitBulkPayment() {
  const days      = parseInt(ms.days) || 0;
  const startDate = document.getElementById('bulk-date').value || today();
  if (!days || days < 1) { showToast('Enter number of days'); return; }
  const loan = state.loans.find(l => l.id === ms.loanId);
  let c = loanCalc(loan);
  let d = new Date(startDate + 'T00:00:00');
  let added = 0;
  for (let i = 0; i < days; i++) {
    if (c.dailyRemaining <= 0) break;
    const dateStr = d.toISOString().slice(0, 10);
    const amount  = Math.min(loan.dailyDue, c.dailyRemaining);
    loan.payments.push({ date: dateStr, amount, type: 'daily' });
    c = loanCalc(loan); added++;
    d.setDate(d.getDate() + 1);
  }
  showSyncIndicator('saving');
  await saveState();
  hideSyncIndicator();
  closeModalDirect();
  const nc = loanCalc(loan);
  showToast(nc.isComplete ? '🎉 Loan fully repaid!' : `${added} day${added > 1 ? 's' : ''} of payments recorded ✓`);
  render();
}

function showSyncIndicator(mode) {
  const el = document.getElementById('sync-bar');
  if (!el) return;
  if (mode === 'loading') { el.textContent = '⟳  Loading data...'; el.classList.add('show'); }
  else if (mode === 'saving') { el.textContent = '⟳  Saving...'; el.classList.add('show'); }
}
function hideSyncIndicator() {
  const el = document.getElementById('sync-bar');
  if (!el) return;
  el.textContent = '✓  Saved';
  setTimeout(() => el.classList.remove('show'), 1200);
}

function showTab(name, el) {
  state.currentTab = name; state.view = null;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active'); render();
}

// Boot: load data from Claude storage then render
(async () => {
  showSyncIndicator('loading');
  await loadState();
  hideSyncIndicator();
  render();
})();
</script>
</body>
